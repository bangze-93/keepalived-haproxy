global_defs {
    router_id LVS_DEVEL
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 0
    vrrp_gna_interval 0
    enable_script_security
    script_user root
}
vrrp_script chk_haproxy {
    script "/usr/bin/killall -0 haproxy"
    interval 2
    weight 2
    timeout 2
    fall 2
    rise 2
}
vrrp_instance LB1 {
    state MASTER
    interface enp0s3
    virtual_router_id 51
    priority 101
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass S3cR3T
    }
    unicast_src_ip 192.168.0.139
    unicast_peer {
        192.168.0.151
    }
    virtual_ipaddress {
        192.168.0.25/24 dev enp0s3
    }
    track_script {
        chk_haproxy
    }
}
